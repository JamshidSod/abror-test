name: Deploy bot

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "Dockerfile"
      - "fly.toml"
      - "questions.json"
      - ".github/workflows/deploy-bot.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
